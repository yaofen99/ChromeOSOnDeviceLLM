# Minijail configuration for llm-service
# This sandboxes the llama-server process for security

# Create a new PID namespace (isolate process tree)
-p

# Create a new IPC namespace
-l

# Create a new network namespace (but we'll still bind to localhost via minijail)
# Skip for now to allow network access: -e

# Create a new UTS namespace (hostname)
--uts

# Mount /opt/llm-service read-only for model access
-b /opt/llm-service

# Mount /tmp for temporary files (needed by llama.cpp)
-b /tmp,,1

# Allow logging
-b /dev/log

# Set no new privileges
-n

# Use seccomp filter (you can add a custom .policy file later)
# -S /usr/share/policy/llm-service-seccomp.policy

# Don't grant any capabilities
-c 0

# Run as dedicated user (you can create one, for now use chronos or nobody)
# -u llm-user
# -g llm-user

# For now, run as chronos (standard ChromeOS user)
-u chronos
-g chronos
